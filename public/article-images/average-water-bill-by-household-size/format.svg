<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#FAF7F2"/>
  <rect x="0" y="0" width="800" height="6" fill="#3F6E52" opacity="0.3"/>
  <text x="400" y="50" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="22" font-weight="700" fill="#1C2B24">average water bill by household size</text>
  <text x="400" y="78" text-anchor="middle" font-family="system-ui,Helvetica,Arial,sans-serif" font-size="14" fill="#6B6459">Data sourced from national surveys and published research</text>
  <rect x="160" y="110" width="480" height="240" rx="8" fill="white" stroke="#E7E2D9" stroke-width="1"/>
  <rect x="160" y="110" width="480" height="40" rx="8" fill="#3F6E52" opacity="0.08"/>
  <text x="400" y="136" text-anchor="middle" font-family="system-ui,Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="#1C2B24">Average Cost Data</text>
  <line x1="160" y1="150" x2="640" y2="150" stroke="#E7E2D9" stroke-width="1"/>
  <line x1="420" y1="110" x2="420" y2="350" stroke="#E7E2D9" stroke-width="1"/>
  <text x="290" y="185" text-anchor="middle" font-family="system-ui,Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#6B6459">Category</text>
  <text x="530" y="185" text-anchor="middle" font-family="system-ui,Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#6B6459">Cost</text>
  <line x1="160" y1="195" x2="640" y2="195" stroke="#E7E2D9" stroke-width="0.5"/>
  <text x="290" y="220" text-anchor="middle" font-family="system-ui,Helvetica,Arial,sans-serif" font-size="13" fill="#1C2B24">Low range</text>
  <text x="530" y="220" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="16" font-weight="600" fill="#3F6E52">$35</text>
  <line x1="160" y1="235" x2="640" y2="235" stroke="#E7E2D9" stroke-width="0.5"/>
  <text x="290" y="260" text-anchor="middle" font-family="system-ui,Helvetica,Arial,sans-serif" font-size="13" fill="#1C2B24">Average</text>
  <text x="530" y="260" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="16" font-weight="600" fill="#3F6E52">$75</text>
  <line x1="160" y1="275" x2="640" y2="275" stroke="#E7E2D9" stroke-width="0.5"/>
  <text x="290" y="300" text-anchor="middle" font-family="system-ui,Helvetica,Arial,sans-serif" font-size="13" fill="#1C2B24">High range</text>
  <text x="530" y="300" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="16" font-weight="600" fill="#3F6E52">$150</text>
  <line x1="160" y1="315" x2="640" y2="315" stroke="#E7E2D9" stroke-width="0.5"/>
  <text x="400" y="340" text-anchor="middle" font-family="system-ui,Helvetica,Arial,sans-serif" font-size="11" fill="#6B6459">/month</text>
  <text x="400" y="420" text-anchor="middle" font-family="system-ui,Helvetica,Arial,sans-serif" font-size="11" fill="#6B6459">Source: EPA WaterSense 2025</text>
</svg>